<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Stats</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Fitness Statistics</h1>
<p>Track your workout progress</p>
</header>

<section class="stats">

<div class="card">
<h2>Calories Burned</h2>
<p id="calories">0</p>
</div>

<div class="card">
<h2>Workouts This Week</h2>
<p id="workouts">0</p>
</div>

<div class="card">
<h2>Weight</h2>
<p id="weight">80 kg</p>
</div>

</section>

<section class="actions">
<button onclick="addWorkout()">Add Workout</button>
<button onclick="burnCalories()">Burn Calories</button>
</section>

<script src="script.js"></script>

</body>
</html>
